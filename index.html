<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customised App V7</title>
<style>
body{font-family:Arial,sans-serif;background:#eef4f7;margin:0;padding:20px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.06);margin-bottom:18px}
button{padding:12px 18px;border:none;border-radius:12px;background:#0b7fab;color:#fff;font-size:16px}
select{padding:10px;border-radius:10px;width:100%;margin:10px 0}
h1,h2{margin:0 0 10px}
.small{color:#666}
</style>
</head>
<body>
<div class="card">
<h1>تطبيق الأوقات الذكي</h1>
<p class="small">تصميم خاص: أحمد المحاميد</p>
</div>

<div class="card">
<h2>اختيار الموقع</h2>
<select id="city">
<option value="doha|Qatar">الدوحة - Qatar</option>
<option value="maan|Jordan">معان - Jordan</option>
<option value="sealine|Qatar">سيلين - Qatar</option>
</select>
<button onclick="saveLocation()">اعتماد الموقع</button>
<button onclick="resetLocation()">العودة للدوحة</button>
<p id="current"></p>
</div>

<script src="app.js"></script>
</body>
</html>
